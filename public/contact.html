<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>Contact — Parker Birwin</title>
  <meta name="description" content="Get in touch with Parker Birwin — email, LinkedIn, and resume." />
  <style>
    @font-face {
      font-family: 'Stolzl';
      src: local('Stolzl Bold'), local('Stolzl-Bold');
      font-weight: 700;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fdffff;
      font-family: 'Stolzl', sans-serif;
      color: #43291f;
      line-height: 1.216;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px 49px 120px;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding-top: 9px;
    }

    .home-link {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2.56px;
      color: #43291f;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .home-link:hover {
      opacity: 0.7;
    }

    nav {
      display: flex;
      gap: 40px;
    }

    nav a {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2.56px;
      color: #43291f;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    nav a:hover {
      opacity: 0.7;
    }

    /* ── Content col ─────────────────────────────────────── */
    .content-col {
      display: flex;
      flex-direction: column;
      gap: 160px;
      width: 100%;
      margin-top: 80px;
    }

    /* ── Hero block ──────────────────────────────────────── */
    .hero-block {
      display: flex;
      flex-direction: column;
    }

    .page-title {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -3.84px;
      line-height: 0.85;
      color: #43291f;
    }

    .tagline {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1.28px;
      color: #43291f;
      margin-top: 16px;
    }

    /* ── Links block ─────────────────────────────────────── */
    .links-block {
      display: flex;
      flex-direction: row;
      gap: 160px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .contact-link {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -3.84px;
      line-height: 1.0;
      color: #d9d9d9;
      background: #43291f;
      text-decoration: none;
      display: inline-block;
      padding: 0 8px 6px;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .contact-link:hover {
      opacity: 0.6;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 1200px) {
      .page {
        padding: 20px 60px 80px;
      }

      .content-col {
        width: 100%;
        max-width: 588px;
        gap: 80px;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 20px 32px 60px;
      }

      .home-link,
      nav a {
        font-size: 36px;
      }

      .content-col {
        gap: 60px;
        margin-top: 40px;
      }

      .page-title {
        font-size: 64px;
      }

      .tagline {
        font-size: 22px;
      }

      .contact-link {
        font-size: 52px;
      }

      .links-block {
        gap: 40px;
      }
    }

    @media (max-width: 480px) {
      .page-title {
        font-size: 56px;
      }

      .contact-link {
        font-size: 48px;
        white-space: normal;
        word-break: break-all;
        max-width: 100%;
      }

      .tagline {
        font-size: 22px;
      }

      .links-block {
        gap: 24px;
      }
    }

    /* ── Hamburger menu ──────────────────────────────────── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 32px;
      height: 22px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      z-index: 300;
    }
    .hamburger span {
      display: block;
      width: 100%;
      height: 3px;
      background: #43291f;
      border-radius: 2px;
    }
    .mobile-nav {
      display: none;
      position: fixed;
      inset: 0;
      background: #fdffff;
      z-index: 250;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2.56px;
      color: #43291f;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .mobile-nav a:hover { opacity: 0.7; }
    .mobile-nav-close {
      position: absolute;
      top: 20px;
      right: 32px;
      font-size: 36px;
      background: none;
      border: none;
      cursor: pointer;
      color: #43291f;
    }
    @media (max-width: 600px) {
      .hamburger { display: flex; }
      nav { display: none; }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="top-bar">
      <a href="/" class="home-link">home</a>
      <nav>
        <a href="work">work</a>
        <a href="about">about</a>
        <a href="contact">contact</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </header>
    <div class="mobile-nav" id="mobile-nav">
      <button class="mobile-nav-close" id="mobile-nav-close">✕</button>
      <a href="work">work</a>
      <a href="about">about</a>
      <a href="contact">contact</a>
    </div>

    <div class="content-col">
      <div class="hero-block">
        <h1 class="page-title">contact</h1>
        <p class="tagline">want to work together?<br>i'd love to hear from you.</p>
      </div>

      <div class="links-block">
        <a href="mailto:pab74641@gmail.com" class="contact-link" id="email-link">email</a>
        <a href="https://www.linkedin.com/in/parkerbryandesign/" target="_blank" rel="noopener" class="contact-link">linkedin</a>
        <a href="assets/ParkerBryanResume.pdf" target="_blank" rel="noopener" class="contact-link">resume</a>
      </div>
    </div>
  </div>
  <script>
    var ham = document.getElementById('hamburger');
    var mobileNav = document.getElementById('mobile-nav');
    var closeBtn = document.getElementById('mobile-nav-close');
    ham.addEventListener('click', function() { mobileNav.classList.add('open'); ham.style.display = 'none'; });
    closeBtn.addEventListener('click', function() { mobileNav.classList.remove('open'); ham.style.display = ''; });

    var emailLink = document.getElementById('email-link');
    emailLink.addEventListener('click', function(e) {
      if (emailLink.textContent === 'email') {
        e.preventDefault();
        emailLink.textContent = 'pab74641@gmail.com';
      }
    });
  </script>
</body>

</html>
